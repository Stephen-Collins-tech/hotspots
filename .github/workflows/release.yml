name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: "Dry run (no push, no release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tools
        run: cargo install cargo-release git-cliff --locked

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: action/package-lock.json

      - name: Quality gates
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all

      - name: Build action dist
        run: |
          cd action
          npm ci
          npm run build

      - name: Commit action dist if changed
        run: |
          if ! git diff --quiet action/dist/; then
            git add action/dist/
            git commit -m "chore: build action dist"
          fi

      - name: Commit Cargo.lock if updated
        run: |
          if ! git diff --quiet Cargo.lock; then
            git add Cargo.lock
            git commit -m "chore: update Cargo.lock"
          fi

      - name: Run cargo-release (dry-run)
        if: inputs.dry_run == true
        run: cargo release ${{ inputs.level }} --no-publish --no-confirm --execute --dry-run

      - name: Run cargo-release
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: cargo release ${{ inputs.level }} --no-publish --no-confirm --execute

      - name: Get released tag
        if: inputs.dry_run != true
        id: tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Release: ${{ inputs.level }} bump" >> $GITHUB_STEP_SUMMARY
          echo "Dry run: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Tag: ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: bump-and-tag
    if: inputs.dry_run != true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            platform: linux
            arch: x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            platform: darwin
            arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            platform: windows
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin hotspots

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/hotspots

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../hotspots-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive }} hotspots

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path hotspots.exe -DestinationPath ../../../hotspots-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotspots-${{ matrix.platform }}-${{ matrix.arch }}
          path: hotspots-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive }}
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    needs: [bump-and-tag, build-binaries]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate changelog for this release
        run: git-cliff --latest --output release-body.md

      - name: Build release notes
        run: |
          TAG="${{ needs.bump-and-tag.outputs.tag }}"
          sed "s/__VERSION__/$TAG/g" .github/release-template.md > release-header.md
          cat release-header.md release-body.md > full-release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-and-tag.outputs.tag }}
          name: ${{ needs.bump-and-tag.outputs.tag }}
          body_path: full-release-notes.md
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Summary
        run: |
          echo "## Release published!" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.bump-and-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          ls -lh artifacts/ >> $GITHUB_STEP_SUMMARY

  publish-npm:
    name: Publish to npm
    needs: [bump-and-tag, build-binaries]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Unpack binaries into platform packages
        run: |
          mkdir -p packages/hotspots-linux-x64/bin
          mkdir -p packages/hotspots-darwin-arm64/bin
          mkdir -p packages/hotspots-win32-x64/bin

          tar -xzf artifacts/hotspots-linux-x86_64.tar.gz -C packages/hotspots-linux-x64/bin/
          tar -xzf artifacts/hotspots-darwin-aarch64.tar.gz -C packages/hotspots-darwin-arm64/bin/
          unzip -o artifacts/hotspots-windows-x86_64.zip -d packages/hotspots-win32-x64/bin/

          chmod +x packages/hotspots-linux-x64/bin/hotspots
          chmod +x packages/hotspots-darwin-arm64/bin/hotspots

      - name: Set versions
        run: |
          TAG="${{ needs.bump-and-tag.outputs.tag }}"
          VERSION="${TAG#v}"
          for pkg in packages/hotspots-linux-x64 packages/hotspots-darwin-arm64 packages/hotspots-win32-x64 packages/hotspots; do
            node -e "
              const fs = require('fs');
              const p = fs.readFileSync('$pkg/package.json', 'utf8');
              const j = JSON.parse(p);
              j.version = '$VERSION';
              if (j.optionalDependencies) {
                for (const k of Object.keys(j.optionalDependencies)) {
                  j.optionalDependencies[k] = '$VERSION';
                }
              }
              fs.writeFileSync('$pkg/package.json', JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/hotspots-linux-x64 && npm publish --access public && cd ../..
          cd packages/hotspots-darwin-arm64 && npm publish --access public && cd ../..
          cd packages/hotspots-win32-x64 && npm publish --access public && cd ../..

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/hotspots && npm publish --access public

  publish-pypi:
    name: Publish to PyPI (${{ matrix.target }})
    needs: bump-and-tag
    if: inputs.dry_run != true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build and publish wheel
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: maturin publish --target ${{ matrix.target }} --no-sdist

  publish-crates:
    name: Publish to crates.io
    needs: bump-and-tag
    if: inputs.dry_run != true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish hotspots-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p hotspots-core

      - name: Publish hotspots-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p hotspots-cli

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [bump-and-tag, publish-release]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest

    steps:
      - name: Download release archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bump-and-tag.outputs.tag }}"
          gh release download "$TAG" \
            --repo Stephen-Collins-tech/hotspots \
            --pattern "hotspots-darwin-aarch64.tar.gz" \
            --pattern "hotspots-linux-x86_64.tar.gz"

      - name: Compute SHA256 hashes
        id: sha
        run: |
          echo "darwin_arm=$(sha256sum hotspots-darwin-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x86=$(sha256sum hotspots-linux-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Clone tap repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Stephen-Collins-tech/homebrew-tap.git tap

      - name: Update formula
        run: |
          TAG="${{ needs.bump-and-tag.outputs.tag }}"
          VERSION_NUM="${TAG#v}"
          SHA_DARWIN_ARM="${{ steps.sha.outputs.darwin_arm }}"
          SHA_LINUX_X86="${{ steps.sha.outputs.linux_x86 }}"
          cat > tap/Formula/hotspots.rb <<EOF
          class Hotspots < Formula
            desc "Static analysis CLI for TypeScript that computes Local Risk Score (LRS)"
            homepage "https://hotspots.dev"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              url "https://github.com/Stephen-Collins-tech/hotspots/releases/download/${TAG}/hotspots-darwin-aarch64.tar.gz"
              sha256 "${SHA_DARWIN_ARM}"
            end

            on_linux do
              on_amd64 do
                url "https://github.com/Stephen-Collins-tech/hotspots/releases/download/${TAG}/hotspots-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "hotspots"
            end

            test do
              system "#{bin}/hotspots", "--version"
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hotspots.rb
          git commit -m "chore: update hotspots to ${{ needs.bump-and-tag.outputs.tag }}"
          git push
