name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: "Dry run (no push, no release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tools
        run: cargo install cargo-release git-cliff --locked

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Quality gates
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all

      - name: Commit Cargo.lock if updated
        run: |
          if ! git diff --quiet Cargo.lock; then
            git add Cargo.lock
            git commit -m "chore: update Cargo.lock"
          fi

      - name: Run cargo-release (dry-run)
        if: inputs.dry_run == true
        run: cargo release ${{ inputs.level }} --no-publish --no-confirm --execute --dry-run

      - name: Run cargo-release
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: cargo release ${{ inputs.level }} --no-publish --no-confirm --execute

      - name: Get released tag
        if: inputs.dry_run != true
        id: tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Release: ${{ inputs.level }} bump" >> $GITHUB_STEP_SUMMARY
          echo "Dry run: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Tag: ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: bump-and-tag
    if: inputs.dry_run != true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            platform: linux
            arch: x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            platform: darwin
            arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            platform: windows
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin hotspots

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/hotspots

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../hotspots-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive }} hotspots

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path hotspots.exe -DestinationPath ../../../hotspots-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotspots-${{ matrix.platform }}-${{ matrix.arch }}
          path: hotspots-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive }}
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    needs: [bump-and-tag, build-binaries]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate changelog for this release
        run: git-cliff --latest --output release-body.md

      - name: Build release notes
        run: |
          TAG="${{ needs.bump-and-tag.outputs.tag }}"
          sed "s/__VERSION__/$TAG/g" .github/release-template.md > release-header.md
          cat release-header.md release-body.md > full-release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-and-tag.outputs.tag }}
          name: ${{ needs.bump-and-tag.outputs.tag }}
          body_path: full-release-notes.md
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Summary
        run: |
          echo "## Release published!" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.bump-and-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          ls -lh artifacts/ >> $GITHUB_STEP_SUMMARY
