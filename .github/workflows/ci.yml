name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore: [ CHANGELOG.md ]
  pull_request:
    branches: [ main, develop ]
    paths-ignore: [ CHANGELOG.md ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Run golden tests
        run: cargo test --package hotspots-core --test golden_tests

      - name: Restore cached release binary (by commit)
        id: bin-cache
        uses: actions/cache/restore@v4
        with:
          path: target/release/hotspots
          key: ${{ runner.os }}-hotspots-bin-${{ github.sha }}

      - name: Build release binary
        if: steps.bin-cache.outputs.cache-hit != 'true'
        run: cargo build --release

      - name: Save release binary cache
        if: steps.bin-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: target/release/hotspots
          key: ${{ runner.os }}-hotspots-bin-${{ github.sha }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Restore cached release binary (by commit)
        id: bin-cache
        uses: actions/cache/restore@v4
        with:
          path: target/release/hotspots
          key: ${{ runner.os }}-hotspots-bin-${{ github.sha }}

      - name: Install Rust (cache miss only)
        if: steps.bin-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary (cache miss only)
        if: steps.bin-cache.outputs.cache-hit != 'true'
        run: cargo build --release
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run integration suite
        run: make test-comprehensive

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-repo-comprehensive/
          retention-days: 7
