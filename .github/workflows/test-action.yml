name: Test Hotspots Action

on:
  pull_request:
    paths:
      - 'action/**'
      - '.github/workflows/test-action.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  prepare-hotspots:
    name: Prepare CLI binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore cached release binary
        id: bin-cache
        uses: actions/cache/restore@v4
        with:
          path: target/release/hotspots
          key: ${{ runner.os }}-hotspots-bin-${{ github.sha }}

      - name: Install Rust toolchain (cache miss only)
        if: steps.bin-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build hotspots binary (cache miss only)
        if: steps.bin-cache.outputs.cache-hit != 'true'
        run: cargo build --release --bin hotspots

      - name: Save cached release binary
        if: steps.bin-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: target/release/hotspots
          key: ${{ runner.os }}-hotspots-bin-${{ github.sha }}

      - name: Upload binary for this workflow run
        uses: actions/upload-artifact@v4
        with:
          name: hotspots-bin-${{ runner.os }}-${{ github.sha }}
          path: target/release/hotspots
          retention-days: 1

  test-action:
    name: Test Action using prepared CLI binary
    needs: prepare-hotspots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared binary
        uses: actions/download-artifact@v4
        with:
          name: hotspots-bin-${{ runner.os }}-${{ github.sha }}
          path: .hotspots-bin

      - name: Verify prepared binary
        run: |
          chmod +x .hotspots-bin/hotspots
          .hotspots-bin/hotspots --version

      - name: Create sample TypeScript project
        run: |
          mkdir -p test-ts-project
          cat > test-ts-project/sample.ts << 'EOF'
          // Simple function (should pass)
          function simple(x: number): number {
            return x + 1;
          }

          // Complex function (might trigger warnings)
          function complex(data: any): any {
            if (data.type === 'A') {
              if (data.nested) {
                if (data.nested.value > 10) {
                  for (let i = 0; i < data.items.length; i++) {
                    if (data.items[i].active) {
                      return processItem(data.items[i]);
                    }
                  }
                } else {
                  return defaultValue();
                }
              }
            } else if (data.type === 'B') {
              return handleTypeB(data);
            }
            return null;
          }

          // Helper functions
          function processItem(item: any): any {
            return item;
          }

          function defaultValue(): any {
            return {};
          }

          function handleTypeB(data: any): any {
            return data;
          }
          EOF

      - name: Run Hotspots Action with prepared binary
        uses: ./action
        id: hotspots
        with:
          binary-path: .hotspots-bin/hotspots
          path: test-ts-project
          policy: critical-introduction
          fail-on: never
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-comment: ${{ github.event_name == 'pull_request' }}

      - name: Display Results
        run: |
          echo "Passed: ${{ steps.hotspots.outputs.passed }}"
          echo "Summary:"
          echo "${{ steps.hotspots.outputs.summary }}"
          echo "Violations:"
          echo "${{ steps.hotspots.outputs.violations }}"

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hotspots-test-report
          path: ${{ steps.hotspots.outputs.report-path }}
          retention-days: 7

      - name: Verify Outputs
        run: |
          if [ -z "${{ steps.hotspots.outputs.passed }}" ]; then
            echo "::error::Output 'passed' is missing"
            exit 1
          fi
          if [ -z "${{ steps.hotspots.outputs.summary }}" ]; then
            echo "::error::Output 'summary' is missing"
            exit 1
          fi
          echo "✅ All outputs present"

      - name: Check Report File Exists
        run: |
          REPORT_PATH="${{ steps.hotspots.outputs.report-path }}"
          if [ -n "$REPORT_PATH" ] && [ -f "$REPORT_PATH" ]; then
            echo "✅ HTML report generated at $REPORT_PATH"
            ls -lh "$REPORT_PATH"
          else
            echo "⚠️ HTML report not found"
          fi
